<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus2AI | Prediction Success Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .report-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .back-btn {
            text-decoration: none;
            color: var(--primary);
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Markdown Styling */
        #content h1 { font-family: 'Outfit'; font-weight: 900; font-size: 2.5rem; color: var(--primary); margin-top: 40px; }
        #content h2 { font-family: 'Outfit'; font-weight: 900; font-size: 1.8rem; margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #content h3 { font-family: 'Outfit'; font-weight: 900; font-size: 1.3rem; margin-top: 25px; color: #334155; }
        #content table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        #content th, #content td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        #content th { background: #f8fafc; font-weight: 700; color: var(--primary); }
        #content blockquote { border-left: 5px solid var(--primary); padding: 15px 25px; background: #f1f5f9; margin: 20px 0; border-radius: 0 15px 15px 0; font-style: italic; }
        #content ul { padding-left: 20px; }
        #content li { margin-bottom: 8px; }
        
        .loading { text-align: center; color: #94a3b8; font-weight: 700; padding: 100px; }
    </style>
</head>
<body>
    <div class="report-container">
        <header>
            <div style="display: flex; gap: 20px;">
                <a href="index.html" class="back-btn">← Dashboard</a>
                <a href="/" class="back-btn" style="color: #64748b;">🏠 Home</a>
            </div>
            <div style="font-weight: 900; color: var(--primary); font-size: 1.2rem; background: #eff6ff; padding: 5px 15px; border-radius: 10px;">Plus2AI</div>
        </header>

        <div id="content">
            <div class="loading">Generating Accuracy Report...</div>
        </div>

        <footer style="margin-top: 60px; padding-top: 30px; border-top: 1px solid #eee; text-align: center; color: #94a3b8; font-size: 0.8rem; font-weight: 700;">
            OFFICIAL ACCURACY REPORT | 2026 KCET | VERIFIED BY PLUS2AI AI ENGINE
        </footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const report = urlParams.get('subject') || 'Biology';
        const fileName = report + '_2026_COMPREHENSIVE_ANALYSIS.md';

        fetch(fileName)
            .then(res => {
                if (!res.ok) throw new Error('Report Not Found');
                return res.text();
            })
            .then(text => {
                // 1. Truncate engineering/internal sections
                let content = text.split(/##? 3\. Engineering/i)[0];
                content = content.split(/##? 4\. Engineering/i)[0];

                // 2. Filter out "The Misses" or "Definitional Padding" sections
                // This regex catches "Group C: The Misses", "Group A: The Definitional Padding", etc.
                const patterns = [
                    /###? Group.*(Misses|Padding|Blindspot)/i,
                    /## \d\. .*Misses/i,
                    /## \d\. .*Blindspot/i
                ];

                for (const pattern of patterns) {
                    content = content.split(pattern)[0];
                }

                document.getElementById('content').innerHTML = marked.parse(content.trim());
                document.title = 'Plus2AI | ' + report + ' Success Audit';
            })
            .catch(err => {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h2 style="color: #ef4444">Report Access Error</h2>
                        <p>${err.message}</p>
                        <a href="index.html" style="color: var(--primary); font-weight: 700">Return to Portal</a>
                    </div>
                `;
            });
    </script>
</body>
</html>
